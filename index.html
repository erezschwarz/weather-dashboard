<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p class="subtitle">Get weather information for any city worldwide</p>
        </header>

        <main>
            <!-- Search Section -->
            <section class="search-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Enter city name..." 
                        autocomplete="off"
                    >
                    <button id="searchBtn" class="search-btn">Search</button>
                </div>
                <div id="error" class="error-message"></div>
            </section>

            <!-- Loading Spinner -->
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>

            <!-- Current Weather Section -->
            <section id="currentWeather" class="weather-section" style="display: none;">
                <div class="current-weather-card">
                    <div class="weather-header">
                        <h2 id="cityName"></h2>
                        <p id="weatherDate"></p>
                    </div>
                    <div class="weather-main">
                        <div class="temperature-display">
                            <span id="temperature" class="temperature"></span>
                            <div id="weatherIcon" class="weather-icon"></div>
                        </div>
                        <div class="weather-description">
                            <p id="description" class="description"></p>
                            <p id="feelsLike" class="feels-like"></p>
                        </div>
                    </div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <span class="detail-label">Humidity</span>
                            <span id="humidity" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Pressure</span>
                            <span id="pressure" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Wind Speed</span>
                            <span id="windSpeed" class="detail-value"></span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Visibility</span>
                            <span id="visibility" class="detail-value"></span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Forecast Section -->
            <section id="forecastSection" class="forecast-section" style="display: none;">
                <h2>5-Day Forecast</h2>
                <div id="forecastContainer" class="forecast-grid"></div>
            </section>

            <!-- Recent Searches Section -->
            <section id="recentSection" class="recent-section" style="display: none;">
                <h2>Recent Searches</h2>
                <div id="recentSearches" class="recent-searches"></div>
            </section>
        </main>

        <footer>
            <p>Weather data provided by <a href="https://openweathermap.org/" target="_blank">OpenWeatherMap API</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
